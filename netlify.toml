# Netlify configuration for TanStack Start (SSR via Nitro `netlify` preset).
# Nitro emits `.netlify/functions-internal/server` and static assets under `dist/`.
# Netlify's build system detects the Nitro output automatically, so no
# functions/redirects wiring is required here.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Security headers (applied to all responses).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache immutable build assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
